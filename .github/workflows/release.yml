name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-assets:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: dbtl
          - os: macos-13
            target: x86_64-apple-darwin
            bin_name: dbtl
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_name: dbtl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: dbtl.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin_name }} dist/${{ matrix.bin_name }}
          if [ "${{ matrix.bin_name }}" = "dbtl" ]; then
            chmod +x dist/dbtl
          fi

          archive="dbtl-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -C dist -czf "$archive" ${{ matrix.bin_name }}
          python -c "import hashlib, pathlib, sys; p = pathlib.Path(sys.argv[1]); p.with_suffix(p.suffix + '.sha256').write_text(f'{hashlib.sha256(p.read_bytes()).hexdigest()}  {p.name}\\n')" "$archive"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-release-asset
          path: |
            dbtl-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            dbtl-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-assets
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
